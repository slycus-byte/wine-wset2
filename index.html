<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WSET Level 2 · 라벨 용어 사전</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
:root {
  --burgundy:#5C1A2E;--claret:#8B2545;--gold:#C9A84C;
  --cream:#F8F3EC;--parchment:#EEE5D4;--ink:#1C1009;
  --muted:#8C7B6B;--border:rgba(201,168,76,0.3);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh}

/* HEADER */
.site-header{background:var(--burgundy);padding:48px 32px 40px;text-align:center;position:relative;overflow:hidden}
.site-header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 50%,rgba(201,168,76,.08),transparent 60%),radial-gradient(ellipse at 70% 30%,rgba(255,255,255,.03),transparent 50%)}
.header-ornament{font-family:'Cormorant Garamond',serif;color:var(--gold);font-size:13px;letter-spacing:4px;text-transform:uppercase;opacity:.8;margin-bottom:10px}
.site-title{font-family:'Cormorant Garamond',serif;color:#F8F3EC;font-size:clamp(32px,5vw,56px);font-weight:300;letter-spacing:2px;line-height:1.1}
.site-title em{font-style:italic;color:var(--gold)}
.site-subtitle{color:rgba(248,243,236,.55);font-size:13px;font-weight:300;letter-spacing:2px;margin-top:10px}
.divider-gold{width:60px;height:1px;background:var(--gold);margin:18px auto;opacity:.6}

/* STATS */
.stat-bar{background:var(--ink);padding:0 32px;display:flex;justify-content:center;gap:0}
.stat-item{padding:14px 28px;text-align:center;border-right:1px solid rgba(255,255,255,.08);cursor:default}
.stat-item:last-child{border-right:none}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:600;color:var(--gold)}
.stat-label{font-size:10px;color:rgba(248,243,236,.4);letter-spacing:1.5px;text-transform:uppercase;margin-top:2px}

/* MAP SECTION */
.map-section{background:var(--ink);padding:0}
.map-header{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid rgba(201,168,76,.2);flex-wrap:wrap;gap:10px}
.map-title-group{display:flex;align-items:center;gap:12px}
.map-title{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;color:var(--cream)}
.map-subtitle{font-size:11px;color:rgba(248,243,236,.4);letter-spacing:1px;text-transform:uppercase}
.map-toggle-btn{padding:7px 18px;background:rgba(201,168,76,.15);border:1px solid var(--gold);color:var(--gold);font-family:'Noto Sans KR',sans-serif;font-size:12px;border-radius:20px;cursor:pointer;transition:all .2s;letter-spacing:.5px}
.map-toggle-btn:hover{background:rgba(201,168,76,.25)}
.map-filter-bar{display:none;padding:10px 24px;gap:8px;border-bottom:1px solid rgba(201,168,76,.1);flex-wrap:wrap;background:rgba(0,0,0,.2)}
.map-filter-bar.open{display:flex}
.map-filter-btn{padding:5px 14px;border:1px solid rgba(201,168,76,.35);background:transparent;color:rgba(248,243,236,.7);font-size:11px;font-family:'Noto Sans KR',sans-serif;border-radius:14px;cursor:pointer;transition:all .2s}
.map-filter-btn.active,.map-filter-btn:hover{background:var(--gold);color:var(--ink);border-color:var(--gold)}
.map-container{max-height:0;overflow:hidden;transition:max-height .5s ease}
.map-container.open{max-height:500px}
#wine-map{width:100%;height:460px;display:block}

/* POPUP */
.wine-popup{font-family:'Noto Sans KR',sans-serif;min-width:200px}
.wine-popup-region{font-size:14px;font-weight:700;color:#2C1A0E;margin-bottom:2px}
.wine-popup-region-en{font-size:11px;color:#8C7B6B;font-style:italic;margin-bottom:6px}
.wine-popup-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px}
.popup-tag{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600}
.popup-tag-red{background:#F0D0D8;color:#7A1C35}
.popup-tag-white{background:#D5E8D5;color:#2A5C2A}
.popup-tag-sparkling{background:#D0DDF0;color:#1A3D6B}
.popup-tag-fortified{background:#E8D8C0;color:#5C3800}
.wine-popup-grape{font-size:11px;color:#5C3800;margin-bottom:4px}
.leaflet-popup-content-wrapper{border-radius:8px;padding:0;overflow:hidden}
.leaflet-popup-content{margin:12px 14px}

/* CONTROLS */
.controls-wrap{background:var(--parchment);border-bottom:2px solid var(--border);padding:16px 24px;display:flex;flex-direction:column;gap:10px;position:sticky;top:0;z-index:100}
.search-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.search-wrap{position:relative;flex:1;min-width:200px}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;pointer-events:none}
.search-input{width:100%;padding:9px 14px 9px 34px;border:1px solid var(--border);border-radius:6px;background:#fff;font-family:'Noto Sans KR',sans-serif;font-size:13px;color:var(--ink);outline:none;transition:border-color .2s}
.search-input:focus{border-color:var(--gold)}
.result-info{font-size:12px;color:var(--muted)}
.result-info strong{color:var(--ink)}

/* TABS */
.tabs-row{display:flex;gap:6px;flex-wrap:wrap}
.tab-btn{padding:6px 14px;border:1px solid var(--border);border-radius:20px;background:#fff;font-family:'Noto Sans KR',sans-serif;font-size:12px;color:var(--muted);cursor:pointer;transition:all .2s;white-space:nowrap}
.tab-btn:hover{border-color:var(--gold);color:var(--ink)}
.tab-btn.active{background:var(--burgundy);border-color:var(--burgundy);color:#fff}
.tab-btn.wt-레드.active{background:#7A1C35;border-color:#7A1C35}
.tab-btn.wt-화이트.active{background:#3A5C40;border-color:#3A5C40}
.tab-btn.wt-스파클링.active{background:#1A3D6B;border-color:#1A3D6B}
.tab-btn.wt-로제.active{background:#C9547A;border-color:#C9547A}
.tab-btn.wt-주정강화.active{background:#5C3800;border-color:#5C3800}
.tabs-divider{width:1px;background:var(--border);margin:0 4px}

/* MAIN */
.main-content{max-width:1200px;margin:0 auto;padding:24px 24px 60px}

/* COUNTRY BLOCK */
.country-block{margin-bottom:36px}
.country-header{display:flex;align-items:center;gap:10px;padding-bottom:10px;margin-bottom:14px;border-bottom:2px solid var(--border)}
.country-flag{font-size:22px}
.country-name{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:var(--burgundy)}
.country-count{font-size:11px;color:var(--muted);margin-left:auto;letter-spacing:1px}

/* WINE TYPE LABEL */
.wine-type-section{margin-bottom:20px}
.wine-type-label{display:inline-block;padding:3px 12px;border-radius:12px;font-size:11px;font-weight:600;letter-spacing:.5px;margin-bottom:10px}
.wt-레드{background:#F0D0D8;color:#7A1C35}
.wt-화이트{background:#D5E8D5;color:#2A5C2A}
.wt-스파클링{background:#D0DDF0;color:#1A3D6B}
.wt-로제{background:#F5D5E5;color:#C9547A}
.wt-주정강화셰리{background:#E8D8C0;color:#5C3800}
.wt-주정강화포트{background:#E0C8C8;color:#6B1818}

/* GRAPE GROUP */
.grape-group{margin-bottom:12px}
.grape-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.grape-name{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.5px}
.grape-count-badge{font-size:10px;color:var(--muted);padding:1px 8px;border:1px solid var(--border);border-radius:8px}

/* CARD */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.wine-card{background:#fff;border-radius:10px;overflow:hidden;border:1px solid #EDE5D8;transition:transform .15s,box-shadow .15s;display:flex;flex-direction:column}
.wine-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(92,26,46,.1)}
.card-stripe{height:4px}
.stripe-레드{background:linear-gradient(90deg,#7A1C35,#B04060)}
.stripe-화이트{background:linear-gradient(90deg,#3A5C40,#6A9C6A)}
.stripe-스파클링{background:linear-gradient(90deg,#1A3D6B,#4A7DBB)}
.stripe-로제{background:linear-gradient(90deg,#C9547A,#E590AA)}
.stripe-주정강화(셰리),.stripe-셰리{background:linear-gradient(90deg,#8B6914,#C9A84C)}
.stripe-주정강화(포트),.stripe-포트{background:linear-gradient(90deg,#6B1818,#B03030)}
.card-body{padding:14px 16px;flex:1;display:flex;flex-direction:column;gap:6px}
.card-label-kr{font-weight:700;font-size:15px;color:var(--ink)}
.card-label-en{font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--muted);font-size:13px}
.card-meta{display:flex;flex-wrap:wrap;gap:4px}
.meta-tag{font-size:10px;padding:2px 8px;border-radius:10px;background:var(--parchment);color:var(--muted)}
.card-detail{font-size:12px;color:#5A4A3A;line-height:1.55}
.card-detail-row{display:flex;gap:6px;margin-bottom:2px}
.detail-icon{flex-shrink:0;opacity:.6}
.card-unique{font-size:11px;color:var(--muted);border-top:1px solid #F0E8DC;padding-top:6px;margin-top:4px;font-style:italic}

/* EMPTY */
.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-state-icon{font-size:40px;margin-bottom:12px}
.empty-state-text{font-size:14px}

::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--parchment)}
::-webkit-scrollbar-thumb{background:var(--gold);border-radius:3px}
@media(max-width:640px){.card-grid{grid-template-columns:1fr}.stat-item{padding:10px 14px}.stat-num{font-size:20px}}
</style>
</head>
<body>

<header class="site-header">
  <div class="header-ornament">Wine Label Reference</div>
  <h1 class="site-title">WSET Level 2 <em>라벨 용어 사전</em></h1>
  <div class="divider-gold"></div>
  <p class="site-subtitle">품종별 · 국가별 라벨 용어 완전 정리</p>
</header>

<div class="stat-bar">
  <div class="stat-item"><div class="stat-num">189</div><div class="stat-label">Total Terms</div></div>
  <div class="stat-item"><div class="stat-num">29</div><div class="stat-label">Grape Varieties</div></div>
  <div class="stat-item"><div class="stat-num">12</div><div class="stat-label">Countries</div></div>
</div>

<!-- MAP SECTION -->
<div class="map-section">
  <div class="map-header">
    <div class="map-title-group">
      <div>
        <div class="map-title">🗺️ 와인 산지 지도</div>
        <div class="map-subtitle">Wine Region Map</div>
      </div>
    </div>
    <button class="map-toggle-btn" id="map-toggle-btn" onclick="toggleMap()">지도 펼치기 ▾</button>
  </div>
  <div id="map-filter-bar" class="map-filter-bar">
    <button class="map-filter-btn active" data-mtype="all">전체</button>
    <button class="map-filter-btn wt-레드" data-mtype="레드">레드</button>
    <button class="map-filter-btn wt-화이트" data-mtype="화이트">화이트</button>
    <button class="map-filter-btn wt-스파클링" data-mtype="스파클링">스파클링</button>
    <button class="map-filter-btn wt-주정강화" data-mtype="주정강화">주정강화</button>
  </div>
  <div id="map-container" class="map-container">
    <div id="wine-map"></div>
  </div>
</div>

<!-- CONTROLS -->
<div class="controls-wrap">
  <div class="search-row">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" class="search-input" id="search-input" placeholder="라벨명, 품종, 국가, 향미로 검색...">
    </div>
    <span class="result-info" id="result-info"></span>
  </div>
  <div class="tabs-row" id="type-tabs">
    <button class="tab-btn active" data-type="all">전체 보기</button>
    <button class="tab-btn wt-레드" data-type="레드">🍷 레드</button>
    <button class="tab-btn wt-화이트" data-type="화이트">🥂 화이트</button>
    <button class="tab-btn wt-스파클링" data-type="스파클링">🫧 스파클링</button>
    <button class="tab-btn wt-로제" data-type="로제">🌸 로제</button>
    <button class="tab-btn wt-주정강화" data-type="주정강화">🍾 주정강화</button>
    <span class="tabs-divider"></span>
    <button class="tab-btn" id="country-all-btn" data-country="all">🌍 전체 국가</button>
  </div>
  <div class="tabs-row" id="country-tabs"></div>
</div>

<main class="main-content">
  <div id="content-area"></div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

// ── STATE ──
let currentType = 'all', currentCountry = 'all', searchTerm = '';
let mapInstance = null, mapMarkers = [];

// ── MAP ──
function initMap() {
  if (mapInstance) return;
  mapInstance = L.map('wine-map', {center:[30,10],zoom:2,minZoom:2,maxZoom:8});
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
    attribution:'© OpenStreetMap © CARTO',subdomains:'abcd',maxZoom:19
  }).addTo(mapInstance);
  renderMapMarkers('all');
  document.getElementById('map-filter-bar').addEventListener('click', e => {
    const btn = e.target.closest('.map-filter-btn');
    if (!btn) return;
    document.querySelectorAll('.map-filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderMapMarkers(btn.dataset.mtype);
  });
}

function getMarkerColor(types) {
  if (types.some(t=>t.includes('주정강화'))) return '#8B6914';
  if (types.includes('스파클링')) return '#4A90D9';
  if (types.includes('레드') && types.includes('화이트')) return '#C9A84C';
  if (types.includes('레드')) return '#B03060';
  if (types.includes('화이트')) return '#3A7A40';
  return '#C9A84C';
}

function renderMapMarkers(filterType) {
  mapMarkers.forEach(m => m.remove());
  mapMarkers = [];
  MAP_REGIONS.forEach(region => {
    const items = filterType === 'all' || filterType === '주정강화'
      ? (filterType === '주정강화' ? region.items.filter(d => d.wine_type.includes('주정강화')) : region.items)
      : region.items.filter(d => d.wine_type === filterType);
    if (!items || items.length === 0) return;
    const color = getMarkerColor(region.wine_types);
    const size = Math.min(10 + items.length * 1.5, 30);
    const icon = L.divIcon({
      className:'',
      html:`<div style="width:${size}px;height:${size}px;border-radius:50%;background:${color};border:2px solid rgba(255,255,255,.7);box-shadow:0 2px 8px rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;font-size:${Math.max(8,size*.38)}px;color:white;font-weight:700;cursor:pointer">${items.length}</div>`,
      iconSize:[size,size],iconAnchor:[size/2,size/2]
    });
    const typeSet = [...new Set(items.map(d=>d.wine_type))];
    const grapeSet = [...new Set(items.map(d=>d.grape))].slice(0,4);
    const typeTagsHtml = typeSet.map(t => {
      const cls = t.includes('포트')?'popup-tag-fortified':t.includes('셰리')?'popup-tag-fortified':t==='레드'?'popup-tag-red':t==='화이트'?'popup-tag-white':'popup-tag-sparkling';
      return `<span class="popup-tag ${cls}">${t}</span>`;
    }).join('');
    const itemsHtml = items.slice(0,7).map(d =>
      `<div style="display:flex;gap:6px;align-items:baseline;margin:2px 0">
        <span style="font-weight:600;font-size:12px">${d.label_kr}</span>
        <span style="color:#8C7B6B;font-style:italic;font-size:11px">${d.label_en}</span>
      </div>`).join('');
    const more = items.length>7?`<div style="font-size:10px;color:#999;margin-top:3px">+${items.length-7}개 더...</div>`:'';
    const popupContent=`<div class="wine-popup">
      <div class="wine-popup-region">${FLAGS[region.country]||''} ${region.name}</div>
      <div class="wine-popup-region-en">${region.name_en} · ${region.country}</div>
      <div class="wine-popup-tags">${typeTagsHtml}</div>
      <div class="wine-popup-grape">🍇 ${grapeSet.join(' · ')}</div>
      <div style="margin-top:8px;border-top:1px solid #F0E8E0;padding-top:8px">${itemsHtml}${more}</div>
    </div>`;
    const marker = L.marker([region.lat,region.lng],{icon})
      .bindPopup(popupContent,{maxWidth:260})
      .addTo(mapInstance);
    mapMarkers.push(marker);
  });
}

function toggleMap() {
  const c=document.getElementById('map-container');
  const fb=document.getElementById('map-filter-bar');
  const btn=document.getElementById('map-toggle-btn');
  const open=c.classList.contains('open');
  c.classList.toggle('open',!open);
  fb.classList.toggle('open',!open);
  btn.textContent=open?'지도 펼치기 ▾':'지도 접기 ▴';
  if (!open) setTimeout(()=>{if(!mapInstance)initMap();else mapInstance.invalidateSize();},50);
}

// ── COUNTRY TABS ──
const allCountries = COUNTRY_ORDER.filter(c => RAW.some(r=>r.country===c));
const countryTabsEl = document.getElementById('country-tabs');
allCountries.forEach(c => {
  const btn = document.createElement('button');
  btn.className = 'tab-btn';
  btn.dataset.country = c;
  btn.textContent = (FLAGS[c]||'') + ' ' + c;
  countryTabsEl.appendChild(btn);
});

// ── FILTER + SEARCH ──
function getFilteredData() {
  const st = searchTerm.toLowerCase();
  return RAW.filter(d => {
    const matchType = currentType==='all'
      || d.wine_type===currentType
      || (currentType==='주정강화' && d.wine_type.includes('주정강화'));
    const matchCountry = currentCountry==='all' || d.country===currentCountry;
    const matchSearch = !st
      || d.label_kr.includes(searchTerm)
      || d.label_en.toLowerCase().includes(st)
      || (d.grape||'').includes(searchTerm)
      || d.country.includes(searchTerm)
      || (d.aroma||'').includes(searchTerm)
      || (d.style||'').includes(searchTerm)
      || (d.unique||'').includes(searchTerm);
    return matchType && matchCountry && matchSearch;
  });
}

function renderCards() {
  const data = getFilteredData();
  document.getElementById('result-info').innerHTML = `<strong>${data.length}</strong>개 항목`;
  const area = document.getElementById('content-area');
  if (data.length===0) {
    area.innerHTML=`<div class="empty-state"><div class="empty-state-icon">🍷</div><div class="empty-state-text">검색 결과가 없습니다</div></div>`;
    return;
  }
  const byCountry={};
  data.forEach(d=>{
    if(!byCountry[d.country]) byCountry[d.country]={};
    if(!byCountry[d.country][d.wine_type]) byCountry[d.country][d.wine_type]={};
    if(!byCountry[d.country][d.wine_type][d.grape]) byCountry[d.country][d.wine_type][d.grape]=[];
    byCountry[d.country][d.wine_type][d.grape].push(d);
  });
  const typeOrder=['레드','로제','화이트','스파클링','주정강화(셰리)','주정강화(포트)'];
  let html='';
  const usedCountries=COUNTRY_ORDER.filter(c=>byCountry[c]);
  usedCountries.forEach(country=>{
    const cd=byCountry[country];
    const total=Object.values(cd).reduce((s,g)=>s+Object.values(g).reduce((ss,a)=>ss+a.length,0),0);
    html+=`<div class="country-block">
      <div class="country-header">
        <span class="country-flag">${FLAGS[country]||'🌍'}</span>
        <span class="country-name">${country}</span>
        <span class="country-count">${total}종</span>
      </div>`;
    typeOrder.forEach(wtype=>{
      if(!cd[wtype]) return;
      const cls=wtype==='레드'?'레드':wtype==='화이트'?'화이트':wtype==='스파클링'?'스파클링':wtype==='로제'?'로제':'주정강화'+wtype.replace('주정강화','').replace(/[()]/g,'');
      html+=`<div class="wine-type-section"><span class="wine-type-label wt-${cls}">${wtype}</span>`;
      Object.entries(cd[wtype]).forEach(([grape,items])=>{
        html+=`<div class="grape-group">`;
        if(items.length>1) html+=`<div class="grape-header"><span class="grape-name">🍇 ${grape}</span><span class="grape-count-badge">${items.length}개 라벨</span></div>`;
        html+=`<div class="card-grid">`;
        items.forEach(item=>{
          const stripeClass=item.wine_type.replace(/[()]/g,'');
          html+=`<div class="wine-card">
            <div class="card-stripe stripe-${item.wine_type}"></div>
            <div class="card-body">
              <div class="card-label-kr">${item.label_kr}</div>
              <div class="card-label-en">${item.label_en}</div>
              <div class="card-meta">
                <span class="meta-tag">⭐ ${item.quality}</span>
                <span class="meta-tag">🍇 ${item.grape}</span>
              </div>
              <div class="card-detail">
                <div class="card-detail-row"><span class="detail-icon">🥂</span><span class="detail-text">${item.style}</span></div>
                <div class="card-detail-row"><span class="detail-icon">👃</span><span class="detail-text">${item.aroma}</span></div>
              </div>
              <div class="card-unique">✦ ${item.unique}</div>
            </div>
          </div>`;
        });
        html+=`</div></div>`;
      });
      html+=`</div>`;
    });
    html+=`</div>`;
  });
  area.innerHTML=html;
}

  const btn=e.target.closest('.tab-btn[data-country]');
  if(!btn) return;
  document.querySelectorAll('#country-tabs .tab-btn, #country-all-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  currentCountry=btn.dataset.country;
  renderCards();
});

document.getElementById('search-input').addEventListener('input', e=>{
  searchTerm=e.target.value.trim();
  renderCards();
});

document.getElementById('country-all-btn').classList.add('active');
renderCards();
</script>
</body>
</html>
